<meta name="theme-color" content="#0C1410">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="مونديال ٢٠٢٦">

<link rel="icon" type="image/png" href="icon-192.png">
<title>متنبئ مونديال ٢٠٢٦</title>
<style>
:root{
  --bg:#0C1410; --surface:#141F18; --surface2:#1A2820; --line:#26382E;
  --ink:#EDF3EE; --muted:#8CA496; --faint:#5E7468;
  --gold:#E3BE56; --gold-dim:#8a7434; --green:#41B873; --green-dim:#1E5237;
  --red:#D07A6A; --amber:#D9A441;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  background:var(--bg); color:var(--ink); min-height:100vh;
  font-family:"SF Arabic","Segoe UI","Noto Naskh Arabic UI","Noto Sans Arabic",Tahoma,system-ui,sans-serif;
  line-height:1.55;
}
.wrap{max-width:600px;margin:0 auto;padding:0 12px 90px}
/* ===== الترويسة ===== */
header{position:sticky;top:0;z-index:30;background:linear-gradient(var(--bg) 78%,transparent);padding:14px 0 6px}
.brand{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:0 2px}
.brand h1{font-size:1.25rem;font-weight:800;letter-spacing:-.01em}
.brand h1 .gold{color:var(--gold)}
.prog{font-size:.8rem;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
.prog b{color:var(--ink)}
nav{display:flex;gap:8px;overflow-x:auto;padding:10px 2px 8px;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;border:1px solid var(--line);background:var(--surface);color:var(--muted);
  padding:8px 14px;border-radius:999px;font-size:.85rem;font-weight:600;cursor:pointer;white-space:nowrap;
}
.chip.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.chip.locked{opacity:.45}
.chip .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-inline-start:6px;vertical-align:1px}
/* ===== بطاقات عامة ===== */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin:12px 0;overflow:hidden}
.card-h{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line)}
.card-h h2{font-size:1rem;font-weight:800}
.card-h .sub{font-size:.75rem;color:var(--muted);font-variant-numeric:tabular-nums}
.note{font-size:.8rem;color:var(--muted);padding:10px 14px;border-top:1px dashed var(--line)}
.hint{font-size:.8rem;color:var(--muted);padding:6px 4px 2px;text-align:center}
/* ===== صف مباراة المجموعات ===== */
.mdlbl{font-size:.72rem;color:var(--faint);padding:8px 14px 0;font-weight:700;letter-spacing:.04em}
.match{display:flex;align-items:center;gap:6px;padding:10px 10px}
.match+.match{border-top:1px solid var(--line)}
.team{flex:1;min-width:0;display:flex;align-items:center;gap:7px;font-size:.9rem;font-weight:600}
.team.away{flex-direction:row-reverse;text-align:left}
.team .flag{font-size:1.35rem;line-height:1}
.team .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scorebox{display:flex;align-items:center;gap:4px}
.stp{display:flex;flex-direction:column;align-items:center;gap:2px}
.stp button{
  width:42px;height:30px;border:none;border-radius:8px;background:var(--surface2);color:var(--muted);
  font-size:1.05rem;font-weight:800;cursor:pointer;touch-action:manipulation;
}
.stp button:active{background:var(--green-dim);color:var(--ink)}
.num{
  width:42px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:9px;
  font-size:1.2rem;font-weight:800;font-variant-numeric:tabular-nums;cursor:pointer;
  border:1.5px dashed var(--line);color:var(--faint);
}
.match.touched .num{border:1.5px solid var(--green-dim);color:var(--ink);background:var(--surface2)}
.colon{color:var(--faint);font-weight:800;padding:0 1px}
/* ===== جدول الترتيب ===== */
table{width:100%;border-collapse:collapse;font-size:.8rem;font-variant-numeric:tabular-nums}
th,td{padding:7px 6px;text-align:center;border-top:1px solid var(--line)}
th{color:var(--faint);font-size:.68rem;font-weight:700}
td.tn{text-align:right;font-weight:700;white-space:nowrap}
tr.q1 td:first-child,tr.q2 td:first-child{box-shadow:inset 3px 0 0 var(--green)}
tr.q3 td:first-child{box-shadow:inset 3px 0 0 var(--amber)}
tr.q4{opacity:.5}
td.pts{font-weight:800;color:var(--ink)}
/* ===== الثوالث ===== */
.t3row{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:.9rem}
.t3row+.t3row{border-top:1px solid var(--line)}
.t3row .rank{width:22px;color:var(--faint);font-weight:800;font-variant-numeric:tabular-nums}
.t3row .meta{margin-inline-start:auto;color:var(--muted);font-size:.75rem;font-variant-numeric:tabular-nums;white-space:nowrap}
.badge{font-size:.68rem;font-weight:800;padding:3px 9px;border-radius:999px}
.badge.in{background:var(--green-dim);color:#9FE8C0}
.badge.out{background:#3a2723;color:var(--red)}
.t3row.out{opacity:.55}
/* ===== حسم التعادل ===== */
.tiebox{background:#2a2110;border:1px solid var(--gold-dim);border-radius:var(--r);margin:12px 0;padding:12px 14px}
.tiebox h3{font-size:.9rem;color:var(--gold);margin-bottom:4px}
.tiebox p{font-size:.78rem;color:var(--muted);margin-bottom:10px}
.tiebox .opts{display:flex;flex-wrap:wrap;gap:8px}
.tiebox .opt{
  border:1px solid var(--gold-dim);background:transparent;color:var(--ink);border-radius:10px;
  padding:8px 12px;font-size:.85rem;font-weight:700;cursor:pointer;
}
.tiebox .opt.picked{background:var(--gold);color:#241c08;border-color:var(--gold)}
.tiebox .opt .ord{font-size:.7rem;font-weight:800;margin-inline-start:5px}
.tiebox .reset{margin-top:10px;background:none;border:none;color:var(--muted);font-size:.75rem;cursor:pointer;text-decoration:underline}
/* ===== الأدوار الإقصائية ===== */
.ko{padding:12px}
.ko .src{font-size:.7rem;color:var(--faint);margin-bottom:6px;display:flex;justify-content:space-between}
.ko .vs{display:flex;flex-direction:column;gap:8px}
.kteam{
  display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--line);
  border-radius:11px;background:var(--surface2);cursor:pointer;font-size:.95rem;font-weight:700;
}
.kteam .flag{font-size:1.5rem}
.kteam .chk{margin-inline-start:auto;color:var(--green);font-weight:900;opacity:0}
.kteam.win{border-color:var(--green);background:var(--green-dim)}
.kteam.win .chk{opacity:1}
.kteam.lose{opacity:.45}
.kteam:disabled{cursor:default}
.mnum{font-size:.72rem;color:var(--faint);font-weight:800}
/* ===== البطل ===== */
.champ{
  text-align:center;padding:34px 16px;border-radius:var(--r);margin:14px 0;
  background:radial-gradient(circle at 50% 0%,#3a2f12,var(--surface) 75%);border:1px solid var(--gold-dim);
}
.champ .cup{font-size:2.6rem}
.champ .flag{font-size:3.4rem;display:block;margin:8px 0 2px}
.champ h2{font-size:1.5rem;color:var(--gold);font-weight:900}
.champ p{color:var(--muted);font-size:.85rem;margin-top:4px}
/* ===== الشجرة ===== */
.tree .stage-t{font-size:.78rem;color:var(--gold);font-weight:800;padding:12px 14px 4px}
.tree .ln{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:.85rem}
.tree .ln+.ln{border-top:1px dashed var(--line)}
.tree .w{font-weight:800}
.tree .l{color:var(--faint)}
.tree .arrow{color:var(--faint);font-size:.75rem}
/* ===== أزرار ===== */
.btn{
  display:block;width:100%;padding:13px;border:none;border-radius:12px;font-size:.95rem;font-weight:800;
  cursor:pointer;background:var(--green);color:#062014;margin:14px 0;
}
.btn.ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--line)}
.btn:disabled{opacity:.4}
.lockmsg{text-align:center;color:var(--muted);font-size:.85rem;padding:40px 20px}
.lockmsg .ic{font-size:2rem;display:block;margin-bottom:8px}
.toolbar{display:flex;gap:10px}
.toolbar .btn{flex:1}
.toast{
  position:fixed;bottom:18px;right:50%;transform:translateX(50%);background:var(--ink);color:var(--bg);
  padding:10px 18px;border-radius:999px;font-size:.85rem;font-weight:700;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;
}
.toast.show{opacity:1}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

<div class="wrap">
  <header>

    </div>
    <nav id="nav"></nav>
  </header>
  <main id="main"></main>
  <div class="toast" id="toast"></div>
</div>

/* فهرس الفرق: code -> {name, flag, group, pos} */
const TEAM = {};

/* نمط الجولات الرسمي (مؤكد من جدول فيفا): ج1: 1×2، 3×4 — ج2: 1×3، 4×2 — ج3: 4×1، 2×3 */
const GROUP_FIXTURE_PATTERN = [[0,1,1],[2,3,1],[0,2,2],[3,1,2],[3,0,3],[1,2,3]];

function groupFixtures(g) {
  return GROUP_FIXTURE_PATTERN.map(([a, b, md], i) => ({
    id: g + i, group: g, md,
    home: TEAMS[g][a][0], away: TEAMS[g][b][0],
  }));
}
const ALL_GROUP_MATCHES = GROUPS.flatMap(groupFixtures);

/* ===== حساب الإحصائيات والترتيب وفق معايير فيفا =====
   داخل المجموعة: النقاط ← فارق الأهداف ← الأهداف المسجلة ← المواجهات المباشرة بين
   المتعادلين (نقاط/فارق/أهداف) ← (لعب نظيف/قرعة = حسم يدوي من المستخدم)            */

function stats(teamIds, matches, scores) {
  const s = {};
  teamIds.forEach(t => s[t] = { pts: 0, gd: 0, gf: 0, ga: 0, w: 0, d: 0, l: 0, p: 0 });
  for (const m of matches) {
    const sc = scores[m.id];
    if (!sc) continue;
    const [hg, ag] = sc;
    const H = s[m.home], A = s[m.away];
    if (!H || !A) continue;
    H.p++; A.p++; H.gf += hg; H.ga += ag; A.gf += ag; A.ga += hg;
    H.gd = H.gf - H.ga; A.gd = A.gf - A.ga;
    if (hg > ag) { H.pts += 3; H.w++; A.l++; }
    else if (hg < ag) { A.pts += 3; A.w++; H.l++; }
    else { H.pts++; A.pts++; H.d++; A.d++; }
  }
  return s;
}

const cmpPGG = (s) => (a, b) => (s[b].pts - s[a].pts) || (s[b].gd - s[a].gd) || (s[b].gf - s[a].gf);
const keyPGG = (s, t) => `${s[t].pts}|${s[t].gd}|${s[t].gf}`;

function clusterBy(order, keyFn) {
  const out = [];
  for (const t of order) {
    const last = out[out.length - 1];
    if (last && keyFn(last[0]) === keyFn(t)) last.push(t); else out.push([t]);
  }
  return out;
}

/* ترتيب مجموعة: يعيد {order, stats, unresolved:[{teams,key}]}
   manual: خريطة key -> ترتيب يدوي محفوظ (مصفوفة أكواد) */
function rankGroup(g, scores, manual) {
  const ids = TEAMS[g].map(t => t[0]);
  const matches = ALL_GROUP_MATCHES.filter(m => m.group === g);
  const S = stats(ids, matches, scores);
  let order = [...ids].sort(cmpPGG(S));
  const unresolved = [];
  const clusters = clusterBy(order, t => keyPGG(S, t));
  const finalOrder = [];
  for (const cl of clusters) {
    if (cl.length === 1) { finalOrder.push(cl[0]); continue; }
    /* مواجهات مباشرة بين المتعادلين فقط */
    const sub = matches.filter(m => cl.includes(m.home) && cl.includes(m.away));
    const SS = stats(cl, sub, scores);
    let subOrder = [...cl].sort(cmpPGG(SS));
    const subClusters = clusterBy(subOrder, t => keyPGG(SS, t));
    for (const sc2 of subClusters) {
      if (sc2.length === 1) { finalOrder.push(sc2[0]); continue; }
      const key = "G:" + g + ":" + [...sc2].sort().join("-");
      const man = manual && manual[key];
      if (man && man.length === sc2.length && man.every(t => sc2.includes(t))) {
        finalOrder.push(...man);
      } else {
        unresolved.push({ teams: sc2, key, ctx: "المجموعة " + g });
        finalOrder.push(...sc2); /* ترتيب مؤقت */
      }
    }
  }
  return { order: finalOrder, stats: S, unresolved };
}

/* ترتيب أصحاب المركز الثالث الـ12: النقاط ← الفارق ← الأهداف ← (لعب نظيف/قرعة = يدوي) */
function rankThirds(groupResults, scores, manual) {
  const thirds = GROUPS.map(g => groupResults[g].order[2]);
  const S = {};
  for (const t of thirds) S[t] = groupResults[TEAM[t].group].stats[t];
  let order = [...thirds].sort(cmpPGG(S));
  const unresolved = [];
  const finalOrder = [];
  for (const cl of clusterBy(order, t => keyPGG(S, t))) {
    if (cl.length === 1) { finalOrder.push(cl[0]); continue; }
    /* التعادل يهم فقط إن كان يقطع حدود التأهل (حول المركز 8) — لكن نطلب حسمه دائمًا للدقة */
    const key = "T3:" + [...cl].sort().join("-");
    const man = manual && manual[key];
    if (man && man.length === cl.length && man.every(t => cl.includes(t))) finalOrder.push(...man);
    else { unresolved.push({ teams: cl, key, ctx: "ترتيب أصحاب المركز الثالث" }); finalOrder.push(...cl); }
  }
  return { order: finalOrder, stats: S, unresolved };
}

const KO_DEF = {

         {n:93,a:83,b:84},{n:94,a:81,b:82},{n:95,a:86,b:88},{n:96,a:85,b:87} ],

  F:   [ {n:104,a:101,b:102} ],
};

/* بناء دور الـ32 من نتائج المجموعات + جدول الملحق C */
function buildR32(groupResults, thirdsResult) {
  const q8 = thirdsResult.order.slice(0, 8);                 /* أفضل 8 ثوالث */
  const q8groups = q8.map(t => TEAM[t].group).sort().join(""); /* مفتاح التركيبة */
  const assign = ANNEX_C[q8groups];                          /* 8 أحرف بترتيب SLOT_ORDER */
  const thirdOf = {}; q8.forEach(t => thirdOf[TEAM[t].group] = t);
  const slotThird = {};
  SLOT_ORDER.forEach((slot, i) => { slotThird[slot] = thirdOf[assign[i]]; });
  const pick = ([kind, g]) =>
    kind === "W" ? groupResults[g].order[0] :
    kind === "R" ? groupResults[g].order[1] : slotThird[g];
  return { combo: q8groups, matches: R32_DEF.map(d => ({ n: d.n, a: pick(d.a), b: pick(d.b) })) };
}

if (typeof module !== "undefined") {
  module.exports = { GROUPS, TEAMS, TEAM, ALL_GROUP_MATCHES, groupFixtures, stats, rankGroup, rankThirds, buildR32, R32_DEF, KO_DEF, SLOT_ORDER };

}
function saveState(){

  try{ localStorage.setItem(LSKEY, JSON.stringify(state)); }catch(e){}

state.scores ||= {}; state.manual ||= {}; state.ko ||= {}; state.view ||= "groups";

/* ================= الحساب المركزي ================= */
let C = {};
function recompute(){
  C.groupResults = {}; C.unresolved = [];
  for(const g of GROUPS){
    const r = rankGroup(g, state.scores, state.manual);
    C.groupResults[g] = r; C.unresolved.push(...r.unresolved);
  }
  C.predicted = ALL_GROUP_MATCHES.filter(m=>state.scores[m.id]).length;
  C.groupsDone = C.predicted === 72;
  C.thirds = C.groupsDone ? rankThirds(C.groupResults, state.scores, state.manual) : null;
  if(C.thirds) C.unresolved.push(...C.thirds.unresolved);
  C.ready32 = C.groupsDone && C.unresolved.length===0;
  C.r32 = C.ready32 ? buildR32(C.groupResults, C.thirds) : null;

  /* سلسلة الفائزين — اختيار غير صالح (تغيّر الطرفان) يُهمل تلقائيًا */
  C.win = {}; C.lose = {}; C.stages = {};
  if(C.r32){
    C.stages.R32 = C.r32.matches.map(m=>{
      const w = state.ko[m.n];
      const valid = w===m.a || w===m.b;
      if(valid){ C.win[m.n]=w; C.lose[m.n] = w===m.a? m.b : m.a; }
      return { n:m.n, a:m.a, b:m.b, w: valid? w : null };
    });
    for(const st of ["R16","QF","SF","F"]){
      C.stages[st] = KO_DEF[st].map(d=>{
        const a = C.win[d.a], b = C.win[d.b];
        if(!a||!b) return { n:d.n, a:null, b:null, w:null };
        const w = state.ko[d.n]; const valid = w===a||w===b;
        if(valid){ C.win[d.n]=w; C.lose[d.n]= w===a? b:a; }
        return { n:d.n, a, b, w: valid? w:null };
      });
    }
    /* مباراة المركز الثالث 103 */
    const la=C.lose[101], lb=C.lose[102];
    C.m103 = (la&&lb) ? { n:103, a:la, b:lb, w:(state.ko[103]===la||state.ko[103]===lb)? state.ko[103]:null } : null;
    if(C.m103 && C.m103.w) C.win[103]=C.m103.w;
  }
  C.champion = C.win && C.win[104] ? C.win[104] : null;
}

/* ================= أدوات عرض ================= */
const $ = s=>document.querySelector(s);
const esc = s=>s; /* أسماء ثابتة من بياناتنا */
const tFlag = c=>TEAM[c].flag, tName=c=>TEAM[c].name;
const tHTML = c=>`<span class="flag">${tFlag(c)}</span><span class="nm">${tName(c)}</span>`;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),1900); }

const STAGE_LIST = [
  {id:"groups", label:"المجموعات"},
  {id:"thirds", label:"الثوالث"},
  {id:"R32", label:"دور الـ32"},
  {id:"R16", label:"دور الـ16"},
  {id:"QF", label:"ربع النهائي"},
  {id:"SF", label:"نصف النهائي"},
  {id:"F", label:"النهائي"},
  {id:"tree", label:"الشجرة"},
];
function stageUnlocked(id){
  switch(id){
    case "groups": case "tree": return true;
    case "thirds": return C.predicted>0;
    case "R32": return C.ready32;
    case "R16": return C.ready32 && C.stages.R32.every(m=>m.w);
    case "QF":  return stageUnlocked("R16") && C.stages.R16.every(m=>m.w);
    case "SF":  return stageUnlocked("QF") && C.stages.QF.every(m=>m.w);
    case "F":   return stageUnlocked("SF") && C.stages.SF.every(m=>m.w);
  }
}
function stageDone(id){
  switch(id){
    case "groups": return C.ready32;
    case "thirds": return C.ready32;
    case "R32": return C.ready32 && C.stages.R32.every(m=>m.w);
    case "R16": return stageUnlocked("QF");
    case "QF": return stageUnlocked("SF");
    case "SF": return stageUnlocked("F");
    case "F": return !!C.champion;
    default: return false;
  }
}

/* ================= التصيير ================= */
function render(){
  recompute();
  /* الترويسة */
  const koCount = C.r32 ? Object.keys(C.win).filter(n=>n!=103).length : 0;
  $("#hdrProg").innerHTML = C.champion
    ? `🏆 <b>${tFlag(C.champion)} ${tName(C.champion)}</b>`
    : C.groupsDone ? `الإقصائيات <b>${koCount}</b>/31` : `المجموعات <b>${C.predicted}</b>/72`;
  /* الشريط */
  $("#nav").innerHTML = STAGE_LIST.map(s=>{
    const un = stageUnlocked(s.id);
    return `<button class="chip ${state.view===s.id?'active':''} ${un?'':'locked'}" data-v="${s.id}">
      ${un?'':'🔒 '}${s.label}${stageDone(s.id)?'<span class="dot"></span>':''}</button>`;
  }).join("");
  document.querySelectorAll("#nav .chip").forEach(b=>b.onclick=()=>{
    const v=b.dataset.v;
    if(!stageUnlocked(v)){ toast("أكمل المرحلة السابقة أولًا"); return; }
    state.view=v; saveState(); render(); window.scrollTo(0,0);
  });
  /* المحتوى */
  const v = state.view;
  const main = $("#main");
  if(!stageUnlocked(v)){ state.view="groups"; saveState(); return render(); }
  if(v==="groups") main.innerHTML = viewGroups();
  else if(v==="thirds") main.innerHTML = viewThirds();
  else if(v==="tree") main.innerHTML = viewTree();
  else if(v==="F") main.innerHTML = viewFinal();
  else main.innerHTML = viewKO(v);
  bindEvents();
}

function tiebox(u){
  const cur = state.manual["_tmp_"+u.key] || [];
  return `<div class="tiebox" data-key="${u.key}">
    <h3>تعادل كامل — ${u.ctx}</h3>
    <p>تطابقت النقاط وفارق الأهداف والأهداف المسجلة${u.key.startsWith("G:")?" والمواجهات المباشرة":""}. وفق لائحة فيفا يُحسم ذلك باللعب النظيف ثم القرعة — وهو ما لا يمكن توقعه حسابيًا، فاختر الترتيب بنفسك بالضغط على الفرق بالتسلسل (الأول فالأعلى):</p>
    <div class="opts">${u.teams.map(t=>{
      const i = cur.indexOf(t);
      return `<button class="opt ${i>-1?'picked':''}" data-t="${t}">${tFlag(t)} ${tName(t)}${i>-1?`<span class="ord">${i+1}</span>`:''}</button>`;
    }).join("")}</div>
    <button class="reset">إعادة الاختيار</button>
  </div>`;
}

function viewGroups(){
  let html = `<p class="hint">اضبط الأهداف بأزرار + و− ، واضغط على الرقم نفسه لاعتماد نتيجة ٠–٠</p>`;
  for(const g of GROUPS){
    const r = C.groupResults[g];
    const ms = ALL_GROUP_MATCHES.filter(m=>m.group===g);
    const done = ms.filter(m=>state.scores[m.id]).length;
    html += `<div class="card"><div class="card-h"><h2>المجموعة ${g}</h2><span class="sub">${done}/6</span></div>`;
    let lastMd = 0;
    for(const m of ms){
      if(m.md!==lastMd){ html += `<div class="mdlbl">الجولة ${m.md}</div>`; lastMd=m.md; }
      const sc = state.scores[m.id];
      const h = sc? sc[0]:0, a = sc? sc[1]:0;
      html += `<div class="match ${sc?'touched':''}" data-m="${m.id}">
        <div class="team">${tHTML(m.home)}</div>
        <div class="scorebox">
          <div class="stp"><button data-act="h+">+</button><div class="num" data-act="confirm">${sc?h:'·'}</div><button data-act="h-">−</button></div>
          <span class="colon">:</span>
          <div class="stp"><button data-act="a+">+</button><div class="num" data-act="confirm">${sc?a:'·'}</div><button data-act="a-">−</button></div>
        </div>
        <div class="team away">${tHTML(m.away)}</div>
      </div>`;
    }
    /* جدول الترتيب */
    html += `<table><tr><th></th><th style="text-align:right">الفريق</th><th>ل</th><th>ف</th><th>ت</th><th>خ</th><th>+/−</th><th>ن</th></tr>`;
    r.order.forEach((t,i)=>{
      const s=r.stats[t];
      html += `<tr class="q${i+1}"><td>${i+1}</td><td class="tn">${tFlag(t)} ${tName(t)}</td><td>${s.p}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td><td>${s.gd>0?'+':''}${s.gd}</td><td class="pts">${s.pts}</td></tr>`;
    });
    html += `</table>`;
    /* تعادلات هذه المجموعة */
    for(const u of r.unresolved) html += tiebox(u);
    html += `</div>`;
  }
  if(C.ready32) html += `<button class="btn" data-go="R32">اكتمل دور المجموعات — انتقل إلى دور الـ32 ←</button>`;
  else if(C.groupsDone) html += `<p class="hint">⚠️ توجد تعادلات تحتاج حسمك أعلاه قبل فتح دور الـ32</p>`;
  html += `<div class="toolbar"><button class="btn ghost" id="resetAll">مسح كل التوقعات</button></div>`;
  return html;
}

function viewThirds(){
  if(!C.groupsDone) {
    const t = GROUPS.filter(g=>ALL_GROUP_MATCHES.filter(m=>m.group===g).every(m=>state.scores[m.id]));
    return `<div class="lockmsg"><span class="ic">⏳</span>يكتمل ترتيب أصحاب المركز الثالث بعد توقع كل مباريات المجموعات (${C.predicted}/72)</div>`;
  }
  const th = C.thirds;
  let html = `<div class="card"><div class="card-h"><h2>أصحاب المركز الثالث</h2><span class="sub">يتأهل أفضل 8 من 12</span></div>`;
  th.order.forEach((t,i)=>{
    const s = th.stats[t];
    html += `<div class="t3row ${i<8?'':'out'}">
      <span class="rank">${i+1}</span>
      <span class="flag">${tFlag(t)}</span><b>${tName(t)}</b>
      <span style="color:var(--faint);font-size:.72rem">(${TEAM[t].group})</span>
      <span class="meta">${s.pts} ن | ${s.gd>0?'+':''}${s.gd} | ${s.gf} هدف</span>
      <span class="badge ${i<8?'in':'out'}">${i<8?'متأهل':'خارج'}</span>
    </div>`;
  });
  html += `<div class="note">الترتيب وفق لائحة فيفا: النقاط ← فارق الأهداف ← الأهداف المسجلة. تركيبة المجموعات المتأهلة تحدد المواجهات من جدول الـ495 احتمالًا (الملحق C).</div></div>`;
  for(const u of th.unresolved) html += tiebox(u);
  return html;
}

const KO_LABEL = {R32:"دور الـ32", R16:"دور الـ16", QF:"ربع النهائي", SF:"نصف النهائي"};
const SRC32 = {};
R32_DEF.forEach(d=>{
  const lbl = x=> x[0]==="W"? `متصدر ${x[1]}` : x[0]==="R"? `وصيف ${x[1]}` : `أفضل ثالث (${x[1]})`;
  SRC32[d.n]=[lbl(d.a),lbl(d.b)];
});
function koCard(m, srcA, srcB){
  const pick = (t)=> m.w===t? "win" : (m.w? "lose":"");
  return `<div class="card"><div class="ko" data-n="${m.n}">
    <div class="src"><span class="mnum">المباراة ${m.n}</span><span>${srcA} × ${srcB}</span></div>
    <div class="vs">
      <button class="kteam ${pick(m.a)}" data-w="${m.a}">${tHTML(m.a)}<span class="chk">✓</span></button>
      <button class="kteam ${pick(m.b)}" data-w="${m.b}">${tHTML(m.b)}<span class="chk">✓</span></button>
    </div>
  </div></div>`;
}
function viewKO(stage){
  const list = stage==="R32" ? C.stages.R32 : C.stages[stage];
  let html = `<p class="hint">اضغط على الفريق الذي تتوقع تجاوزه لهذا الدور</p>`;
  for(const m of list){
    const src = stage==="R32" ? SRC32[m.n] : [`الفائز من م${KO_DEF[stage].find(d=>d.n===m.n).a}`,`الفائز من م${KO_DEF[stage].find(d=>d.n===m.n).b}`];
    html += koCard(m, src[0], src[1]);
  }
  const next = {R32:"R16",R16:"QF",QF:"SF",SF:"F"}[stage];
  if(list.every(m=>m.w)) html += `<button class="btn" data-go="${next}">اكتمل ${KO_LABEL[stage]} — ${next==="F"?"إلى النهائي":"إلى "+KO_LABEL[next]} ←</button>`;
  return html;
}

function viewFinal(){
  const f = C.stages.F[0];
  let html = "";
  if(C.champion){
    html += `<div class="champ"><div class="cup">🏆</div><span class="flag">${tFlag(C.champion)}</span>
      <h2>${tName(C.champion)}</h2><p>بطل العالم ٢٠٢٦ بحسب توقعاتك — عبر ٨ مباريات من المجموعات إلى MetLife</p></div>`;
  }
  html += `<p class="hint">المباراة 104 — النهائي · 19 يوليو · MetLife Stadium</p>`;
  html += koCard(f, "الفائز من م101", "الفائز من م102");
  if(C.m103){
    html += `<p class="hint">المباراة 103 — تحديد المركز الثالث (اختياري)</p>`;
    html += koCard(C.m103, "خاسر م101", "خاسر م102");
  }
  if(C.champion) html += `<button class="btn" data-go="tree">اعرض الشجرة الكاملة ←</button>
    <button class="btn ghost" id="copySummary">نسخ ملخص التوقعات 📋</button>`;
  return html;
}

function viewTree(){
  if(!C.ready32) return `<div class="lockmsg"><span class="ic">🌳</span>تظهر الشجرة بعد اكتمال توقعات المجموعات وحسم التعادلات<br>(${C.predicted}/72)</div>`;
  let html = "";
  if(C.champion){
    html += `<div class="champ"><div class="cup">🏆</div><span class="flag">${tFlag(C.champion)}</span><h2>${tName(C.champion)}</h2></div>`;
  }
  html += `<div class="card tree">`;
  const stageRows = [["النهائي — 19 يوليو", C.stages.F],["نصف النهائي", C.stages.SF],["ربع النهائي", C.stages.QF],["دور الـ16", C.stages.R16],["دور الـ32", C.stages.R32]];
  for(const [lbl, list] of stageRows){
    html += `<div class="stage-t">${lbl}</div>`;
    for(const m of list){
      if(!m.a){ html += `<div class="ln"><span class="mnum">م${m.n}</span><span class="l">بانتظار توقعات الدور السابق</span></div>`; continue; }
      const ln = (t)=> `<span class="${m.w? (m.w===t?'w':'l') : ''}">${tFlag(t)} ${tName(t)}</span>`;
      html += `<div class="ln"><span class="mnum">م${m.n}</span>${ln(m.a)}<span class="arrow">×</span>${ln(m.b)}${m.w?`<span class="arrow">←</span><span class="w">${tFlag(m.w)}</span>`:""}</div>`;
    }
  }
  html += `<div class="note">تركيبة الثوالث المتأهلة: ${C.r32.combo.split("").join("، ")} — التوزيع وفق الملحق C من لائحة فيفا.</div></div>`;
  html += `<button class="btn ghost" id="copySummary">نسخ ملخص التوقعات 📋</button>`;
  return html;
}

/* ================= الملخص النصي ================= */
function summaryText(){
  let out = "🏆 توقعاتي لمونديال 2026\n";
  if(C.champion) out += `البطل: ${tFlag(C.champion)} ${tName(C.champion)}\n`;
  const f = C.stages.F[0];
  if(f.a) out += `النهائي: ${tName(f.a)} × ${tName(f.b)}\n`;
  if(C.stages.SF.every(m=>m.a)) out += `نصف النهائي: ${C.stages.SF.map(m=>tName(m.a)+"×"+tName(m.b)).join(" | ")}\n`;
  out += `متصدرو المجموعات: ${GROUPS.map(g=>tFlag(C.groupResults[g].order[0])).join(" ")}\n`;
  if(C.thirds) out += `الثوالث المتأهلون: ${C.thirds.order.slice(0,8).map(tFlag).join(" ")}`;
  return out;
}

/* ================= الأحداث ================= */
function bindEvents(){
  /* أهداف المجموعات */
  document.querySelectorAll(".match").forEach(el=>{
    el.querySelectorAll("[data-act]").forEach(b=>{
      b.onclick = ()=>{
        const id = el.dataset.m;
        let sc = state.scores[id] ? [...state.scores[id]] : null;
        const act = b.dataset.act;
        if(act==="confirm"){ if(!sc) sc=[0,0]; }
        else{
          if(!sc) sc=[0,0];
          const i = act[0]==="h"?0:1, d = act[1]==="+"?1:-1;
          sc[i] = Math.max(0, Math.min(15, sc[i]+d));
        }
        state.scores[id]=sc; saveState(); render();
      };
    });
  });
  /* حسم التعادل بالترتيب */
  document.querySelectorAll(".tiebox").forEach(box=>{
    const key = box.dataset.key;
    box.querySelectorAll(".opt").forEach(o=>{
      o.onclick = ()=>{
        const t = o.dataset.t;
        const tmp = state.manual["_tmp_"+key] || [];
        if(tmp.includes(t)) return;
        tmp.push(t); state.manual["_tmp_"+key]=tmp;
        const total = box.querySelectorAll(".opt").length;
        if(tmp.length===total){ state.manual[key]=tmp; delete state.manual["_tmp_"+key]; toast("تم حسم الترتيب ✓"); }
        saveState(); render();
      };
    });
    const rst = box.querySelector(".reset");
    if(rst) rst.onclick = ()=>{ delete state.manual["_tmp_"+key]; delete state.manual[key]; saveState(); render(); };
  });
  /* اختيار فائز الإقصائيات */
  document.querySelectorAll(".ko").forEach(el=>{
    el.querySelectorAll(".kteam").forEach(b=>{
      b.onclick = ()=>{ state.ko[el.dataset.n]=b.dataset.w; saveState(); render(); };
    });
  });
  /* تنقّل */
  document.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>{ state.view=b.dataset.go; saveState(); render(); window.scrollTo(0,0); });
  const cp = $("#copySummary");
  if(cp) cp.onclick = ()=>{
    const txt = summaryText();
    if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(()=>toast("نُسخ الملخص ✓"), ()=>prompt("انسخ يدويًا:", txt));
    else prompt("انسخ يدويًا:", txt);
  };
  const ra = $("#resetAll");
  if(ra) ra.onclick = ()=>{ if(confirm("سيتم مسح كل توقعاتك. متأكد؟")){ state={scores:{},manual:{},ko:{},view:"groups"}; saveState(); render(); } };
}

render();

/* تسجيل عامل الخدمة للعمل دون إنترنت (يعمل فقط عبر https) */
if ("serviceWorker" in navigator && location.protocol === "https:") {
  try { navigator.serviceWorker.register("sw.js"); } catch (e) {}
}
</script>
